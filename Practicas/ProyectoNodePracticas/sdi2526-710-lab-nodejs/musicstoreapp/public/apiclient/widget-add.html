<div id="widget-agregar" >
    <div class="form-group">
        <label class="control-label col-sm-2" for="title-add">Nombre:</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" name="title-add"
                   placeholder="Título de la canción"  id="title-add" required />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-sm-2" for="kind-add">Género:</label>
        <div class="col-sm-10">
            <select class="form-control" name="kind-add" id="kind-add" required>
                <option value="pop">Pop</option>
                <option value="folk">Folk</option>
                <option value="rock">Rock</option>
                <option value="reagge">Reagge</option>
                <option value="rap">Hip-hop Rap</option>
                <option value="latino">Latino</option>
                <option value="blues">Blues</option>
                <option value="otros">Otros</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-sm-2" for="price-add">Precio (€):</label>
        <div class="col-sm-10">
            <input type="number" step="0.01" class="form-control" name="price-add"
                   placeholder="2.50" id="price-add" min="0.01" required />
        </div>
    </div>
    <div class="col-sm-offset-2 col-sm-10">
        <button type="button" class="btn btn-primary" id="boton-add"
                onclick="widgetAddSong()">Nueva canción</button>
    </div>
</div>
<script>
    function widgetAddSong( ) {
        $.ajax({
            url: URLbase + "/songs",
            type: "POST",
            data: {
                title: $("#title-add").val(),
                kind: $("#kind-add").val(),
                price: $("#price-add").val()
            },
            dataType: 'json',
            headers: {"token": token},
            success: function (response) {
                $("#main-container").load("widget-songs.html");
            },
            error: function (error) {
                let message = "Error al crear la cancion";
                if (error.responseJSON && error.responseJSON.error) {
                    message = error.responseJSON.error;
                }
                $("#main-container").prepend("<div class='alert alert-danger'>" + message + "</div>");
            }
        });
    }
</script>
