<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar espacio</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <section class="space-shell">
        <header class="space-header">
            <div>
                <p class="space-kicker">Panel administrador</p>
                <h1>Editar espacio</h1>
                <p class="hint-text">Actualiza la información del espacio seleccionado.</p>
            </div>
        </header>

        <form class="space-filter space-form" th:action="@{/espacios/{id}/editar(id=${space.id})}" method="post" th:object="${space}">
            <input type="hidden" th:field="*{id}" />
            <div class="field-row">
                <label for="name">Nombre</label>
                <input id="name" type="text" th:field="*{name}" placeholder="Sala Norte" required />
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</div>
            </div>
            <div class="field-row">
                <label for="type">Tipo</label>
                <select id="type" th:field="*{type}" required>
                    <option value="" disabled>Selecciona un tipo</option>
                    <option value="SALA">SALA</option>
                    <option value="AULA">AULA</option>
                    <option value="COWORK">COWORK</option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Error</div>
            </div>
            <div class="field-row">
                <label for="location">Ubicación</label>
                <input id="location" type="text" th:field="*{location}" placeholder="Edificio A - Planta 1" required />
                <div class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}">Error</div>
            </div>
            <div class="field-row">
                <label for="capacity">Capacidad</label>
                <input id="capacity" type="number" min="1" max="999" th:field="*{capacity}" placeholder="1" required />
                <div class="field-error" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}">Error</div>
            </div>
            <div class="field-row">
                <label for="description">Descripción</label>
                <input id="description" type="text" th:field="*{description}" placeholder="Sala luminosa para reuniones." />
            </div>
            <div class="field-row">
                <label for="status">Estado</label>
                <select id="status" th:field="*{status}" required>
                    <option th:value="ACTIVE">ACTIVO</option>
                    <option th:value="CANCELLED">CANCELADO</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="primary-btn" type="submit">Guardar cambios</button>
                <a class="secondary-btn link-btn" th:href="@{/spaces}">Volver</a>
            </div>
        </form>
    </section>
</main>
<footer class="footer">
    SDI 2026 - Gestión de reservas
</footer>
</body>
</html>
