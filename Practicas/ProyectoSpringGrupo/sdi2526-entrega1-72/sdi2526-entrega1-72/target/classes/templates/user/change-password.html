<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{password.change.title}">Reserva - Cambiar contraseña</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <section class="auth-shell">
        <div class="auth-grid">
            <aside class="auth-aside">
                <h1 th:text="#{password.change.heading}">Seguridad de la cuenta</h1>
                <p th:text="#{password.change.description}">Actualiza tu contraseña para mantener protegidas tus reservas.</p>
            </aside>

            <div class="auth-form-wrap">
                <div class="lang-switch">
                    <span th:text="#{common.language}">Idioma</span>
                    <a th:href="|?lang=es|" th:text="#{lang.es}">ES</a>
                    <span>|</span>
                    <a th:href="|?lang=en|" th:text="#{lang.en}">EN</a>
                </div>

                <h2 th:text="#{password.change.form.title}">Cambiar contraseña</h2>
                <p class="hint-text" th:text="#{password.change.form.hint}">Introduce tu contraseña actual y la nueva.</p>

                <div class="top-error" th:if="${changeError}" th:text="${changeError}"></div>
                <div class="top-success" th:if="${changeSuccess}" th:text="${changeSuccess}"></div>

                <form th:action="@{/password/change}" th:object="${changePassword}" method="post">
                    <div class="field-row">
                        <label for="currentPassword" th:text="#{password.change.current}">Contraseña actual</label>
                        <div class="password-field">
                            <input id="currentPassword" type="password" th:field="*{currentPassword}" />
                            <button class="password-toggle" type="button"
                                    th:attr="aria-label=#{common.password.toggle.show},title=#{common.password.toggle.show}"
                                    data-password-toggle aria-pressed="false"></button>
                        </div>
                        <div class="field-error" th:if="${#fields.hasErrors('currentPassword')}"
                             th:text="${#fields.errors('currentPassword')[0]}"></div>
                    </div>

                    <div class="field-row">
                        <label for="newPassword" th:text="#{password.change.new}">Contraseña nueva</label>
                        <div class="password-field">
                            <input id="newPassword" type="password" th:field="*{newPassword}" />
                            <button class="password-toggle" type="button"
                                    th:attr="aria-label=#{common.password.toggle.show},title=#{common.password.toggle.show}"
                                    data-password-toggle aria-pressed="false"></button>
                        </div>
                        <div class="field-error" th:if="${#fields.hasErrors('newPassword')}"
                             th:text="${#fields.errors('newPassword')[0]}"></div>
                    </div>

                    <div class="actions">
                        <a th:href="@{/espacios/disponibles}"
                           class="secondary-btn link-btn"
                           style="width:160px; height:42px; display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box; color:#1f3a4b; font-weight:600; font-size:1rem;"
                           th:text="#{password.change.back}">
                            Volver al panel
                        </a>
                        <button class="primary-btn"
                                type="submit"
                                style="width:160px; height:42px; display:inline-flex; align-items:center; justify-content:center; box-sizing:border-box;"
                                th:text="#{password.change.save}">
                            Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>
<footer class="footer">
    SDI 2026 - Gestión de reservas
</footer>
<script th:src="@{/js/password-toggle.js}"></script>
</body>
</html>
